<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Shopping Cart - GreenLeaf Nursery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 5%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .back-btn {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .back-btn:hover {
            transform: translateX(-2px);
            box-shadow: 0 5px 15px rgba(40,167,69,0.4);
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #28a745, #20c997);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-left: auto;
        }
        .continue-shopping {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .continue-shopping:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(40,167,69,0.3);
        }
        .main-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 5%;
        }
        .cart-section {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 2rem;
            color: #2d5a2d;
            margin-bottom: 1rem;
            text-align: center;
        }
        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
        }
        .cart-empty img {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        .cart-items {
            margin-bottom: 2rem;
        }
        .cart-item {
            display: flex;
            align-items: center;
            padding: 1.5rem;
            border: 1px solid #eee;
            border-radius: 15px;
            margin-bottom: 1rem;
            background: #f8f9fa;
        }
        .item-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 1rem;
        }
        .item-details {
            flex: 1;
        }
        .item-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2d5a2d;
            margin-bottom: 0.5rem;
        }
        .item-price {
            font-size: 1.1rem;
            color: #28a745;
            font-weight: 600;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0;
        }
        .qty-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-decrease {
            background: #dc3545;
            color: white;
        }
        .qty-increase {
            background: #28a745;
            color: white;
        }
        .qty-display {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
        }
        .remove-item {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .cart-summary {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid #eee;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .total-row {
            font-size: 1.5rem;
            font-weight: 800;
            color: #28a745;
            border-top: 2px solid #eee;
            padding-top: 1rem;
            margin-top: 1rem;
        }
        .checkout-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s;
        }
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(40,167,69,0.3);
        }
        @media (max-width: 768px) {
            .header {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .logo {
                margin-left: 0;
                font-size: 1.5rem;
            }
            .cart-item {
                flex-direction: column;
                text-align: center;
            }
            .item-image {
                margin-right: 0;
                margin-bottom: 1rem;
            }
        }
        
    </style>
</head>
<body>
<div id="toast" style="
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);  /* 🔥 MUST ADD */
    background: #28a745;
    color: white;
    padding: 15px 25px;
    border-radius: 10px;
    display: none;
    font-weight: 600;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    z-index: 9999;  /* 🔥 add this */
">
    Item removed successfully ✅
</div>
    <header class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <a href="index.html" class="logo">🌿 GreenLeaf Nursery</a>
        <a href="product.html" class="continue-shopping">Continue Shopping</a>
    </header>

    <div class="main-container">
        <div class="cart-section">
            <h2 class="section-title">🛒 Shopping Cart</h2>
            <div id="cartContainer">
                <!-- Dynamic cart content -->
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('nurseryCart')) || [];
        let products = JSON.parse(localStorage.getItem('nurseryProducts')) || [];

        // Back button function
        function goBack() {
            window.history.back();
        }

        renderCart();

        function renderCart() {
            const container = document.getElementById('cartContainer');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                    <div>🛒</div>
                    <h3>Your cart is empty</h3>
                    <p>Add some beautiful plants to get started!</p>
                    <a href="product.html" class="continue-shopping" style="display: inline-block; margin-top: 1rem;">Start Shopping</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = cart.map(item => {
                const product = products.find(p => p.id == item.id) || item;
                const totalPrice = (item.price * item.quantity);
                
                return `
                    <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}" class="item-image" 
                         onerror="this.src='https://images.unsplash.com/photo-1581291518857-4e27b48ff24e?w=400'">
                    <div class="item-details">
                        <h3 class="item-name">${item.name}</h3>
                        <div class="item-price">₹${item.price.toLocaleString('en-IN')} each</div>
                        <div class="quantity-controls">
                            <button class="qty-btn qty-decrease" onclick="updateQuantity(${item.id}, -1)">−</button>
                            <span class="qty-display">${item.quantity}</span>
                            <button class="qty-btn qty-increase" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div style="font-size: 1.2rem; color: #28a745; font-weight: 600; margin-top: 0.5rem;">
                            Total: ₹${totalPrice.toLocaleString('en-IN')}
                        </div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id})">Remove</button>
                    </div>
                `;
            }).join('') + `
                <div class="cart-summary">
                    ${cart.map(item => {
                        const product = products.find(p => p.id == item.id) || item;
                        return `<div class="summary-row">${product.name} × ${item.quantity}</div>`;
                    }).join('')}
                    <div class="summary-row"><strong>Subtotal:</strong> <strong>₹${getTotal().toLocaleString('en-IN')}</strong></div>
                    <div class="summary-row"><strong>Tax (8%):</strong> <strong>₹${(getTotal() * 0.08).toLocaleString('en-IN')}</strong></div>
                    <div class="total-row">
                        <strong>Total:</strong> 
                        <strong>₹${(getTotal() * 1.08).toLocaleString('en-IN')}</strong>
                    </div>
                    <button class="checkout-btn" onclick="checkout()">
                        💳 Proceed to Checkout
                    </button>
                </div>
            `;
        }

        function updateQuantity(productId, change) {
        const item = cart.find(item => item.id == productId);
            if (!item) return;

            const product = products.find(p => p.id == productId);
            const maxStock = product ? product.stock : 999;

            if (change > 0 && item.quantity >= maxStock) {
                alert(`Only ${maxStock} items available in stock!`);
                return;
            }

            item.quantity += change;
            
            if (item.quantity <= 0) {
               cart = cart.filter(c => c.id != productId);
            }

            localStorage.setItem('nurseryCart', JSON.stringify(cart));
            renderCart();
        }

        function removeFromCart(productId) {
          cart = cart.filter(item => item.id != productId);
            localStorage.setItem('nurseryCart', JSON.stringify(cart));
            renderCart();

            showToast("Item removed successfully ✅");
        }

        function getTotal() {
            return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        }
function checkout() {
    if (cart.length === 0) return;

    let total = getTotal() * 1.08; // include tax

    // ✅ save items
    localStorage.setItem('cartOrderData', JSON.stringify(cart));

    // ✅ save total (🔥 THIS IS MISSING)
    localStorage.setItem('cartTotal', total.toFixed(2));

    // redirect
    window.location.href = 'payment.html';
}
function showToast(message) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 2000);
}
    </script>
</body>
</html>
