<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Haven Nursery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg,#2ecc71,#27ae60,#1abc9c,#16a085);
    background-size:400% 400%;
    animation:bgAnimation 10s ease infinite;
}

@keyframes bgAnimation{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:420px;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    text-align:center;
    position: relative;
}

.back-btn {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(255,255,255,0.9);
    color: #27ae60;
    border: 2px solid #27ae60;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    text-decoration: none;
}
.back-btn:hover {
    background: #27ae60;
    color: white;
    transform: scale(1.1);
}

h2{
    margin-bottom:10px;
    color:#2d3436;
}

p{
    font-size:14px;
    margin-bottom:20px;
    color:#636e72;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-bottom:2px solid #ccc;
    outline:none;
}

.input-box input:focus{
    border-color:#27ae60;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#27ae60,#2ecc71);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.switch-link{
    margin-top:15px;
    font-size:14px;
}

.switch-link a{
    color:#27ae60;
    text-decoration:none;
    font-weight:600;
    cursor:pointer;
}

.hidden{
    display:none;
}

@media (max-width: 480px) {
    .container {
        width: 90%;
        margin: 1rem;
    }
}
</style>
</head>

<body>
<div class="container">
    <button class="back-btn" onclick="goToHome()">←</button>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <h2>🌿 Green Haven Nursery</h2>
        <p>Login to manage your plants</p>
        <form name="myform" action="login.php" method="POST" onsubmit="return loginUser()">
            <div class="input-box">
                <input type="text" name="username" placeholder="Enter Username" required="">
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Enter Password" required="">
            </div>

            <button type="submit">Login</button>
        </form>
        </form>

        <div class="switch-link">
            Don't have an account?
            <a onclick="showRegister()">Sign Up</a>
        </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <h2>Create Account 🌱</h2>
        <p>Register your new account</p>

      <form id="registerFormData">
    <div class="input-box">
        <input type="text" id="regUsername" name="username" placeholder="Username" required>
    </div>

    <div class="input-box">
        <input type="email" id="regEmail" name="email" placeholder="Email" required>
    </div>

    <div class="input-box">
        <input type="password" id="regPassword" name="password" placeholder="Password" required>
    </div>

    <button type="submit">Register</button>
</form>
        <div class="switch-link">
            Already have a account?
            <a onclick="showLogin()">Login</a>
        </div>

    
    </div>
</div>

<script>
function goBack() {
    window.history.back();
}

function showRegister(){
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}

// REGISTER
document.getElementById("registerFormData").addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("regUsername").value;
    const email = document.getElementById("regEmail").value;
    const password = document.getElementById("regPassword").value;

    console.log(username, email, password); // 🔥 DEBUG

    fetch("register.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `username=${username}&email=${email}&password=${password}`
    })
    .then(res => res.text())
    .then(data => {
        console.log(data); // 🔥 DEBUG

        if(data.trim() === "success"){
            alert("Registration Successful 🌱");
            showLogin();
        } else {
            alert("Response: " + data);
        }
    });
});
function goToHome() {
    window.location.href = "index.html"; // 🔥 home page
}
// LOGIN

</script>

</body>
</html>
