<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Nursery Shop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#28a745,#20c997);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Poppins', sans-serif;
}
.login-card{
    width:100%;
    max-width:420px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}
.form-control{
    border-radius:10px;
}
.btn-success{
    border-radius:10px;
}
.login-card{
    position: relative; /* IMPORTANT */
    width:100%;
    max-width:420px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.back-btn{
    position:absolute;
    top:25px;
    left:15px;
    width:40px;
    height:40px;
    border:2px solid #28a745;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#28a745;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.back-btn:hover{
    background:#28a745;
    color:white;
}
</style>
</head>
<body>

<div class="card login-card p-4">
    <div class="back-btn" onclick="goBack()">←</div>
    <div class="text-center mb-4">
        <h3 class="fw-bold text-success">🌿 Nursery Admin</h3>
        <p class="text-muted">Login to continue</p>
    </div>

    <form id="loginForm">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                    👁
                </button>
            </div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label">Remember Me</label>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-success btn-lg">
                Login
            </button>
        </div>

        <div class="text-center mt-3">
            <a href="product.html" class="text-decoration-none">⬅ Back to Shop</a>
        </div>

    </form>
</div>

<script>
const form = document.getElementById("loginForm");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // Demo credentials
    if(user === "admin" && pass === "1115"){

        if(document.getElementById("remember").checked){
            localStorage.setItem("adminLoggedIn", "true");
        } else {
            sessionStorage.setItem("adminLoggedIn", "true");
        }

        window.location.href = "admin.html";
    }
    else{
        alert("Invalid Username or Password!");
    }
});

function togglePassword(){
    const passField = document.getElementById("password");
    passField.type = passField.type === "password" ? "text" : "password";
}

// Auto login check
if(localStorage.getItem("adminLoginIn") === "true"){
    window.location.href = "admin.html";
}
function goBack(){
    window.history.back();
}
</script>

</body>
</html>
